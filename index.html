<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark_Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== signup and login section starts ===== -->
  <div id="accountForm">
    <div class="container">
      <!-- ===== signup section starts ===== -->
      <div id="signupForm"  style="display: none;">
        <input type="text" id="signupUsername">
        <input type="password" name="" id="signupPassword">
        <button id="signupButton">sign up</button>
        <p id="signupMsg"></p>
      </div>
      <!-- ===== signup section ends ===== -->
      <!-- ===== login section starts ===== -->
      <div id="loginForm">
        <input type="text" id="loginUsername">
        <input type="password" name="" id="loginPassword">
        <button id="loginButton">login</button>
        <p id="loginMsg"></p>
      </div>
      <!-- ===== login section ends ===== -->
      <p>
        <button id="toggleButton">Don't have an account? signup</button>
      </p>
    </div>
  </div>
  <!-- ===== signup and login section ends ===== -->
  <button id="themeToggle">Dark Mode</button>

  <script src="custom.js"></script>
</body>
</html>
